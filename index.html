<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manekar Alert - Rule-Based Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .ghost-hidden { display: none !important; }
        .theme-trust-gradient { background: linear-gradient(135deg, #062c43 0%, #051c2c 100%); }
    </style>
</head>
<body class="bg-[#0b2240] text-white font-sans">

    <header class="bg-[#081a33] border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-5">
            <h1 class="text-2xl font-bold">Manekar Alert</h1>
            <nav class="hidden md:flex gap-6 font-semibold">
                <a href="#calculator-section" class="hover:text-green-400">Calculator</a>
                <a href="#validation" class="hover:text-green-400">Validation</a>
                <a href="#pricing" class="hover:text-green-400">Pricing</a>
                <button onclick="toggleModal('loginModal', true)" class="bg-blue-600 px-4 py-2 rounded-lg text-sm">Login</button>
            </nav>
        </div>
    </header>

    <section id="calculator-section" class="py-20 px-6 max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold mb-6">Hybrid Mathematical Sandbox</h2>
        <div class="bg-[#081a33] p-8 rounded-xl border border-gray-800">
            <input type="number" id="high-val" placeholder="52-Week High" class="w-full mb-4 bg-[#0b2240] p-3 rounded border border-gray-700">
            <input type="number" id="close-val" placeholder="Current Close" class="w-full mb-4 bg-[#0b2240] p-3 rounded border border-gray-700">
            <button onclick="sendToGhostBackend()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold">Calculate Drawdown</button>
            <div id="out-drawdown" class="mt-4 text-emerald-400 font-mono text-xl"></div>
        </div>
    </section>

    <section id="pricing" class="py-16 px-6 bg-[#081a33] scroll-mt-20">
        <h2 class="text-4xl font-bold text-center mb-2">Simple Pricing Architecture</h2>
        <p class="text-gray-400 text-center mb-12">Strictly limited to 5,000 long-term investors.</p>
        <div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">
            <div class="bg-[#0b2240] p-8 rounded-xl border border-gray-700">
                <h3 class="text-emerald-400 font-bold text-xl">Free Vault</h3>
                <div class="text-3xl font-bold my-4">₹0</div>
            </div>
            <div class="bg-blue-900/30 rounded-xl border-2 border-blue-500 p-8 shadow-2xl relative">
                <h3 class="text-blue-400 font-bold text-xl">Premium Node</h3>
                <div class="text-3xl font-bold my-4 text-white">₹999 <span class="text-sm font-normal text-gray-400">/year</span></div>
                <button onclick="toggleModal('loginModal', true)" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Join Premium</button>
            </div>
        </div>
    </section>

    <div id="loginModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 ghost-hidden px-4">
        <div class="bg-[#081a33] border border-gray-800 rounded-2xl w-full max-w-md p-8 relative">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-4 right-4">✕</button>
            <form onsubmit="executeSecureLogin(event)" class="space-y-4">
                <input type="email" placeholder="Email" class="w-full bg-[#0b2240] p-2 rounded">
                <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Verify Access</button>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('ghost-hidden', !show);
        }
        function sendToGhostBackend() {
            const high = document.getElementById('high-val').value;
            const close = document.getElementById('close-val').value;
            if(high && close) {
                const drawdown = ((high - close) / high * 100).toFixed(2);
                document.getElementById('out-drawdown').innerText = "Result: " + drawdown + "%";
            }
        }
        function executeSecureLogin(e) { e.preventDefault(); alert("System Engaged"); }
    </script>
</body>
</html>
