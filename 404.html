<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | Manekar Alert</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b2240] text-white flex items-center justify-center min-h-screen">

<div class="text-center px-6">

<h1 class="text-7xl font-bold text-green-400">404</h1>

<h2 class="text-3xl font-bold mt-4">
Page Not Found
</h2>

<p class="text-gray-300 mt-4 max-w-md mx-auto">
The page you are looking for does not exist or has been moved.
</p>

<a href="/"
class="inline-block mt-8 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold">
Return to Home
</a>

</div>

</body>
</html>
