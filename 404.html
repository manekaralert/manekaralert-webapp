<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Manekar Alert</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" type="image/png" href="logo.png">

    <style>
        body{
            background:#081B33;
            font-family:Arial,Helvetica,sans-serif;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="text-center max-w-xl px-6">

    <img src="logo.png"
         alt="Manekar Alert Logo"
         class="w-24 h-24 mx-auto mb-6 rounded-full shadow-lg">

    <h1 class="text-8xl font-extrabold text-emerald-400">
        404
    </h1>

    <h2 class="text-3xl font-bold text-white mt-4">
        Page Not Found
    </h2>

    <p class="text-gray-300 mt-5 leading-7">
        Sorry, the page you are looking for does not exist,
        may have been moved, or the URL is incorrect.
    </p>

    <div class="mt-10">
        <a href="/"
           class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-xl font-semibold transition duration-300">
            ← Back to Home
        </a>
    </div>

    <div class="mt-12 text-sm text-gray-400">
        <p>Manekar Alert</p>
        <p>Educational Rule-Based Market Intelligence Platform</p>
        <p class="mt-2">
            © 2026 Manekar Alert. All Rights Reserved.
        </p>
    </div>

</div>

</body>
</html>
